# Embedding eval — query set (round 2). 8 intent types x 7 divergent queries = 56.
# Built to cover the real spread of how someone searches an art collection.
# "divergent" = the 7 within a type deliberately spread across the space.
#
# intent -> AI-judge rubric (what "relevant" means):
#   keyword  - is the named object/subject literally depicted?
#   occasion - would a curator feature this for that festival/event?
#   motif    - does the visual pattern/structure appear, regardless of subject?
#   mood     - does the artwork *evoke* the feeling?
#   style    - does it exhibit that art style / movement / technique look?
#   medium   - is it made in that medium / material?
#   metadata - does it match that artist / title / accession / classification / date?
#   color    - is that colour prominent in the artwork?
#
# metadata + color queries deliberately probe where pure embeddings hit a floor
# (exact accession numbers, exact hex) — that gap is the case for hybrid search.

queries:
  # --- keyword / object / subject -------------------------------------
  - { id: kw-01, type: keyword,  text: "fishing boats and sampans by the shore" }
  - { id: kw-02, type: keyword,  text: "a self-portrait of the artist" }
