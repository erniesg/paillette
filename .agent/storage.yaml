# Generated by rucksack. Store secret values in secret stores, not this file.
version: 1
binary_policy:
  repo_limit_mb: 10
  use_git_lfs_for:
    - "*.psd"
    - "*.mp4"
  use_object_storage_for:
    - evidence
    - generated-assets
    - large-ingest-corpora
stores:
  github_artifacts: evidence for CI runs
  r2: large generated assets and public app media
  local_vm_cache: disposable cache only
object_storage:
  provider: r2
  bucket: paillette-assets-stg
  prefix: generated/
  account_id_secret: CLOUDFLARE_ACCOUNT_ID
  access_key_id_secret: R2_ACCESS_KEY_ID
  secret_access_key_secret: R2_SECRET_ACCESS_KEY
  endpoint_secret: R2_ENDPOINT
detected_generated_roots:
    []
notes:
  - Keep generated evidence, screenshots, traces, model outputs, and ingest corpora out of normal commits.
  - Treat the VM disk as cache; GitHub issues, PRs, artifacts, and object storage are durable.
