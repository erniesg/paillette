# Generated by rucksack. Commands are names, not secrets.
version: 1
commands:
  install:
    command: "pnpm install --frozen-lockfile"
    timeout_seconds: 600
    required: true
  lint:
    command: "pnpm run lint"
    timeout_seconds: 900
    required: true
  workflow-contracts:
    command: "node --test scripts/__tests__/rucksack-workflows.test.mjs"
    timeout_seconds: 60
    required: true
  type-check:
    command: "pnpm run typecheck"
    timeout_seconds: 900
    required: true
  test:
    command: "pnpm run test"
    timeout_seconds: 900
    required: true
  build:
    command: "pnpm run build"
    timeout_seconds: 900
    required: true
  open-gate:
    command: "pnpm open:gate -- --manifest tmp/nga-dry-run.json"
    timeout_seconds: 60
    required: false
  nga-dry-run:
    command: "pnpm open:dry-run -- --providers=nga --sample-size=5 --sample-caption=any --out=tmp/nga-launch-dry-run.json"
    timeout_seconds: 180
    required: false
  nga-r2-ledger-proof:
    command: "pnpm open:assets -- --manifest tmp/nga-launch-dry-run.json --db tmp/nga-launch-assets.sqlite --out-dir tmp/nga-launch-assets --providers=nga --limit=10 --init --status && pnpm open:assets -- --db tmp/nga-launch-assets.sqlite --out-dir tmp/nga-launch-assets --download --providers=nga --download-limit=10 --concurrency=4 --status"
    timeout_seconds: 600
    required: false
  nga-r2-upload-proof:
    command: "test -n \"$ANVIL_R2_BUCKET\" && pnpm open:apply -- --manifest tmp/nga-launch-dry-run.json --out-dir tmp/nga-r2-upload-proof --limit=2 --asset-mode=r2 --bucket \"$ANVIL_R2_BUCKET\" --download --upload --upload-concurrency=1"
    timeout_seconds: 600
    required: false
  nga-r2-queue-plan:
    command: "pnpm open:queue -- --manifest tmp/nga-launch-dry-run.json --out-dir tmp/nga-launch-queue --limit=10 --asset-mode=r2"
    timeout_seconds: 120
    required: false
  rucksack-status:
    command: "python3 -m rucksack autopilot status erniesg/paillette --execute --repo-root ."
    timeout_seconds: 120
    required: false
  rucksack-refresh-github:
    command: "python3 -m rucksack autopilot status erniesg/paillette --execute --notify-github --repo-root ."
    timeout_seconds: 120
    required: false
  rucksack-refresh-discord:
    command: "python3 -m rucksack autopilot status erniesg/paillette --execute --notify --repo-root ."
    timeout_seconds: 120
    required: false
  unlock-portal-preflight:
    command: "cd infra/cloudflare/rucksack-unlock-portal && node --check src/index.js && node -e 'const fs=require(\"fs\"); const c=JSON.parse(fs.readFileSync(\"wrangler.jsonc\",\"utf8\")); const repos=String(c.vars?.ALLOWED_REPOS||\"\").split(\",\").map((s)=>s.trim()).filter(Boolean); if(!repos.includes(\"erniesg/paillette\")){ console.error(\"ALLOWED_REPOS must include erniesg/paillette\"); process.exit(2); }'"
    timeout_seconds: 60
    required: false
  unlock-portal-deploy:
    command: "cd infra/cloudflare/rucksack-unlock-portal && npm install && npx wrangler types && npx wrangler secret put GITHUB_TOKEN && npx wrangler deploy"
    timeout_seconds: 600
    required: false
  unlock-r2-local-ui:
    command: "rucksack autopilot unlock-ui erniesg/paillette --issue 18 --env-secret CLOUDFLARE_ACCOUNT_ID --env-secret CLOUDFLARE_API_TOKEN --app-env R2_ACCESS_KEY_ID --app-env R2_SECRET_ACCESS_KEY --app-env R2_ENDPOINT --resource r2 --bucket <approved-r2-bucket> --environment live --repo-root . --decision accept|hold --execute"
    timeout_seconds: 300
    required: false
  unlock-jina-local-ui:
    command: "rucksack autopilot unlock-ui erniesg/paillette --issue 20 --secret JINA_API_KEY --environment live --repo-root . --decision accept|hold --execute"
    timeout_seconds: 300
    required: false
  dev:
    command: "pnpm run dev"
    timeout_seconds: 0
    required: false
  vm-verify:
    command: "infra/vm/verify.sh"
    timeout_seconds: 120
    required: false
