# Generated by rucksack. Secret values must stay in GitHub/VM secret stores, not this file.
schema_version: 1
mode: disabled
merge:
  method: squash
  close_linked_issues: true
eligible:
  base_branch_patterns:
    - main
    - master
    - staging
  head_branch_patterns:
    - "codex/issue-*-rucksack"
    - "claude/issue-*-rucksack"
human_opt_in:
  commands:
    - "/rucksack merge"
  labels:
    - rucksack-merge-approved
required:
  checks:
    - checks
  review_state: approved
  linked_issue: true
  evidence_manifest: true
  clean_evidence: true
  secret_scan: true
forbidden:
  requested_changes: true
  failing_checks: true
  unknown_check_state: true
  secret_scan_failure: true
  untrusted_branch_owner: true
  fork_branches: true
  dirty_evidence: true
  missing_issue_linkage: true
production_gates:
  branches:
    - main
    - master
    - production
    - "release/**"
  deploy_paths:
    - ".github/**"
    - "infra/**"
    - "deploy/**"
    - "migrations/**"
    - "billing/**"
    - "auth/**"
    - "**/auth/**"
    - ".agent/deploy.yaml"
    - ".agent/merge-policy.yaml"
    - "scripts/agent-evidence"
  require_human_opt_in: true
notes:
  safety: "Disabled until a maintainer chooses human-command-only, label-only, human-opt-in, or automatic."
  approval_boundary: "Resolving a human gate is not merge approval; use /rucksack merge or rucksack-merge-approved."
