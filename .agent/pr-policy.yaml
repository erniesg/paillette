# Generated by rucksack. Secret values must stay in GitHub/VM secret stores, not this file.
schema_version: 1
auto_merge:
  enabled: true
  method: squash
  require_linked_issue: true
  require_evidence_manifest: true
  require_secret_scan: true
  require_independent_review: true
  require_green_checks: true
review:
  codex_request_comment: "@codex review"
  independent_reviewers:
    - codex-code-review
    - human-maintainer
risk:
  low_risk_paths:
    - "docs/**"
    - "tests/**"
    - "*.md"
    - "README.md"
  app_code_paths:
    - "src/**"
    - "rucksack/**"
    - "app/**"
    - "apps/**"
  human_only_paths:
    - ".github/**"
    - ".agent/pr-policy.yaml"
    - ".agent/policy.yaml"
    - ".agent/autopilot.yaml"
    - ".agent/deploy.yaml"
    - "scripts/agent-evidence"
    - "infra/**"
    - "deploy/**"
    - "migrations/**"
    - "billing/**"
    - "auth/**"
    - "**/auth/**"
    - "*secret*"
    - "**/*secret*"
    - "*credential*"
    - "**/*credential*"
    - "src/rucksack/autopilot.py"
    - "src/rucksack/ci_access.py"
    - "src/rucksack/ci_setup.py"
    - "src/rucksack/github_access.py"
    - "src/rucksack/repo_access.py"
    - "src/rucksack/scaffold.py"
    - "src/rucksack/vm_access.py"
    - "src/rucksack/vm_queue.py"
human_only:
  escape_hatch_label: rucksack-human-merge
  note: "Apply this label to keep a PR human-merge-only even after checks and review pass."
security:
  use_github_auto_merge_only: true
  never_bypass_branch_protection_from_vm: true
  fork_prs_may_not_read_write_tokens: true
