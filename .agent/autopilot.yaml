# Generated by rucksack. Secret values must stay in GitHub/VM secret stores, not this file.
schema_version: 1
repo: erniesg/paillette
target: vm
profile: erniesg-ai-vm
provider: vm-codex
issue_dir: docs/issues
human_ping: '@erniesg'
rucksack_install: 'rucksack-ai'
staging_branch: staging
production_branch: master
labels:
  queue_label: rucksack-queued
  run_label: rucksack-run
  running_label: rucksack-running
  blocked_label: rucksack-blocked
  needs_clarification_label: rucksack-needs-clarification
  needs_decision_label: rucksack-needs-decision
  needs_human_label: rucksack-needs-human
  provider_limited_label: rucksack-provider-limited
  out_of_work_label: rucksack-out-of-work
human_commands:
      queue: /rucksack queue
      run: /rucksack run #123
      retry: /rucksack retry #123
      hold: /rucksack hold #123
      accept: /rucksack accept
      recommend: rucksack autopilot recommend OWNER/REPO --issue 123 --recommendation "recommended path" --ping @owner
validation:
  evidence_command: scripts/agent-evidence
  secret_scan: required
  diff_check: required
security:
  branch_code_write_tokens: forbidden
  generated_workflows_owned_by_default_branch: true
