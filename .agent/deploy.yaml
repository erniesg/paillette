# Generated by rucksack. Names only; do not store secret values here.
version: 1
ci_cd:
  provider: github-actions
  target: vm
  profile: erniesg-ai-vm
  enabled_variable: RUCKSACK_DEPLOY_ENABLED
  branches:
    staging: staging
    production: main

  environments:
    staging:
      github_environment: staging
      auto_deploy: true
      remote_path: /opt/rucksack-app/staging/erniesg-paillette
      compose_project: rucksack-staging-erniesg-paillette
      healthcheck_var: RUCKSACK_HEALTHCHECK_URL
      required_secrets:
      - RUCKSACK_VM_HOST
      - RUCKSACK_VM_USER
      - RUCKSACK_VM_SSH_KEY
      - RUCKSACK_APP_ENV
    production:
      github_environment: production
      auto_deploy: false
      approval_required: true
      remote_path: /opt/rucksack-app/production/erniesg-paillette
      compose_project: rucksack-production-erniesg-paillette
      healthcheck_var: RUCKSACK_HEALTHCHECK_URL
      required_secrets:
      - RUCKSACK_VM_HOST
      - RUCKSACK_VM_USER
      - RUCKSACK_VM_SSH_KEY
      - RUCKSACK_APP_ENV
  iac:
    preferred_tool: tofu
    pr:
      - tofu fmt -check -recursive
      - tofu init -backend=false
      - tofu validate
    deploy:
      - tofu plan
      - "never run tofu apply from pull_request; production apply requires protected environment approval"
  rollback:
    previous_release_file: previous-release
