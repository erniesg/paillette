# Generated by rucksack. Edit per repo.
version: 1
untrusted_input:
  - issues
  - pull_request_comments
  - web_pages
  - logs
  - pasted_external_text
require_human_approval:
  - ".github/workflows/**"
  - ".agent/deploy.yaml"
  - "infra/**"
  - "migrations/**"
  - "billing/**"
  - "auth/**"
blocked_without_approval:
  - "deploy"
  - "terraform apply"
  - "tofu apply"
  - "pulumi up"
  - "gcloud run deploy"
  - "firebase deploy"
  - "kubectl apply"
  - "rollback"
  - "dns update"
  - "iam update"
  - "wrangler deploy"
  - "wrangler deploy --env production"
secret_policy:
  no_secret_values_in_repo: true
  fork_prs_may_not_read_secrets: true
  subscription_auth_vm_only: true
self_heal:
  max_attempts: 2
  require_human_after_repeated_failure: true
