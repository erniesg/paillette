# Generated by rucksack. This default-branch workflow refreshes the issue ledger.
name: Rucksack Issue Ledger

on:
  workflow_dispatch:
    inputs:
      intent:
        description: "Optional planning intent for the Codex issue planner"
        required: false
        type: string
        default: "refresh the repository issue ledger with clear definitions of done"
      model:
        description: "Optional Codex model override"
        required: false
        type: string
      effort:
        description: "Codex reasoning effort"
        required: false
        type: choice
        options: [low, medium, high]
        default: medium
      timeout_seconds:
        description: "Maximum seconds to wait for the Codex issue planner"
        required: false
        type: string
        default: "3600"
  schedule:
    # Weekly issue-ledger refresh before the overnight queue window.
    - cron: "23 17 * * 0"

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: rucksack-ledger-${{ github.repository }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
      RUCKSACK_LEDGER_INTENT: ${{ inputs.intent || 'refresh the repository issue ledger with clear definitions of done' }}
      RUCKSACK_LEDGER_MODEL: ${{ inputs.model || '' }}
      RUCKSACK_LEDGER_EFFORT: ${{ inputs.effort || 'medium' }}
      RUCKSACK_LEDGER_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds || '3600' }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rucksack and Codex CLI
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade rucksack-ai
          if ! command -v codex >/dev/null 2>&1; then
            npm install -g @openai/codex
          fi
          codex app-server --help >/dev/null

      - name: Refresh issue specs with Codex app-server
        run: |
          set -euo pipefail
          python3 -m rucksack github issues plan erniesg/paillette \
            --repo-root "$GITHUB_WORKSPACE" \
            --issue-dir docs/issues \
            --intent "$RUCKSACK_LEDGER_INTENT" \
            --model "$RUCKSACK_LEDGER_MODEL" \
            --effort "$RUCKSACK_LEDGER_EFFORT" \
            --timeout-seconds "$RUCKSACK_LEDGER_TIMEOUT_SECONDS" \
            --execute

      - name: Ensure autopilot labels
        run: |
          set -euo pipefail
          python3 -m rucksack autopilot labels erniesg/paillette --execute

      - name: Validate and seed GitHub issues
        run: |
          set -euo pipefail
          python3 -m rucksack github issues seed erniesg/paillette \
            --issue-dir docs/issues \
            --label rucksack-ledger \
            --label rucksack-queued \
            --marker-prefix rucksack-issue-spec \
            --execute

      - name: Dispatch queued issues
        run: |
          set -euo pipefail
          gh workflow run rucksack-autopilot.yml \
            --repo erniesg/paillette \
            --ref "$DEFAULT_BRANCH" \
            -f action=queue \
            -f provider=vm-codex \
            -f max_dispatches=2

      - name: Create or update issue-ledger PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.token }}
          branch: rucksack-ledger-${{ github.run_id }}
          title: "Rucksack issue ledger refresh"
          body: |
            Generated by the Rucksack issue-ledger workflow.

            This PR contains markdown issue specs created or updated by the Codex app-server planner.
            GitHub issues were seeded or updated by stable Rucksack markers.
          commit-message: "chore: refresh rucksack issue ledger"
          delete-branch: false
