# Generated by rucksack.
# Fork-safe: this workflow intentionally reads no repository/environment secrets.
# Secret-bearing deploy/notify work belongs in a separate gated workflow.
name: agent-evidence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.evidence.outputs.status }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run agent evidence
        id: evidence
        shell: bash
        env:
          GITHUB_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set +e
          bash scripts/agent-evidence
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          manifest="$(find .agent/evidence -name manifest.json | sort | tail -1)"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize evidence
        if: always()
        shell: bash
        run: |
          manifest="${{ steps.evidence.outputs.manifest }}"
          if [ -n "$manifest" ] && [ -f "$manifest" ]; then
            echo "## Agent Evidence" >> "$GITHUB_STEP_SUMMARY"
            node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); console.log(`- Result: ${m.result}\n- Commit: ${m.commit}\n- Lanes: ${(m.lanes_run || []).join(", ") || "(none)"}\n- Required failures: ${(m.required_failures || []).join(", ") || "(none)"}`)' "$manifest" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No evidence manifest found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-evidence-${{ github.run_id }}
          path: .agent/evidence
          if-no-files-found: warn

      - name: Fail if evidence failed
        if: always()
        run: exit "${{ steps.evidence.outputs.status || '1' }}"

  comment:
    needs: evidence
    if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Download evidence artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: agent-evidence-${{ github.run_id }}
          path: evidence-artifact

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        shell: bash
        run: |
          manifest="$(find evidence-artifact -name manifest.json | sort | tail -1)"
          if [ -z "$manifest" ] || [ ! -f "$manifest" ]; then
            echo "No evidence manifest found; skipping PR comment."
            exit 0
          fi
          body="$(MANIFEST="$manifest" node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync(process.env.MANIFEST,"utf8")); const lines=["<!-- agent-evidence -->","### Agent evidence","",`- Result: \`${m.result}\``,`- Commit: \`${m.commit}\``,`- Lanes: \`${(m.lanes_run || []).join(", ") || "(none)"}\``,`- Required failures: \`${(m.required_failures || []).join(", ") || "(none)"}\``]; console.log(lines.join("\n"));')"
          existing="$(gh pr view "$PR_URL" --json comments --jq '.comments[] | select(.body | contains("<!-- agent-evidence -->")) | .id' | tail -1)"
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body="$body" >/dev/null
          else
            gh pr comment "$PR_URL" --body "$body"
          fi
