# Generated by rucksack. Build steps come from this default-branch workflow.
name: Rucksack Build From Issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to build from"
        required: true
        type: string
      provider:
        description: "Provider: codex-action | vm-codex | claude"
        required: false
        type: string
        default: "vm-codex"
      prompt_override:
        description: "Optional additional trusted maintainer instruction"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: rucksack-build-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
    steps:
      - name: Checkout default branch harness
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Load issue context
        id: issue
        run: |
          set -euo pipefail
          gh issue view "${{ inputs.issue_number }}"             --json title,body,labels,url             --jq '{title, body, labels: [.labels[].name], url}' > "$RUNNER_TEMP/issue.json"
          title="$(jq -r '.title' "$RUNNER_TEMP/issue.json")"
          url="$(jq -r '.url' "$RUNNER_TEMP/issue.json")"
          {
            echo "title<<__RUCKSACK__"
            echo "$title"
            echo "__RUCKSACK__"
            echo "url=$url"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex provider
        if: inputs.provider == 'codex-action'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          prompt: |
            You are building from a GitHub issue in a Rucksack-managed repository.

            Issue: #${{ inputs.issue_number }}
            Issue URL: ${{ steps.issue.outputs.url }}
            Title: ${{ steps.issue.outputs.title }}

            Read `$RUNNER_TEMP/issue.json`, AGENTS.md, `.agent/verify.md`, `.agent/autopilot.yaml`,
            and the local code before editing. Implement a small passing slice that satisfies the
            issue definition of done. If the issue lacks enough information, do not guess; update
            files only if there is a safe recommended clarification artifact to produce.

            Required before final response:
            - run the repo validation commands that are available;
            - run `scripts/agent-evidence` when present;
            - report generated-file and security caveats.

            Trusted maintainer override:
            ${{ inputs.prompt_override }}

      - name: VM provider instructions
        if: inputs.provider == 'vm-codex'
        run: |
          set -euo pipefail
          update_provider_handoff() {
            issue_number="$1"
            body_file="$2"
            marker="$3"
            existing_comment_id="$(gh api "repos/$GH_REPO/issues/$issue_number/comments" --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$existing_comment_id" ]; then
              gh api "repos/$GH_REPO/issues/comments/$existing_comment_id" -X PATCH -F body=@"$body_file"
            else
              gh issue comment "$issue_number" --body-file "$body_file"
            fi
            gh issue edit "$issue_number"               --remove-label rucksack-running               --remove-label rucksack-queued               --remove-label rucksack-run               --remove-label rucksack-awaiting-review               --add-label rucksack-blocked               || true
          }
          cat > "$RUNNER_TEMP/vm-provider.md" <<'EOF'
          <!-- rucksack-autopilot-provider-handoff -->
          Rucksack selected `vm-codex` for this issue.

          This is a VM handoff, not a failure. VM-based agents run on the trusted VM, not inside GitHub Actions.
          GitHub is the queue and audit log; it does not SSH into your VM.
          The VM worker uses the VM user's Codex/Claude login and repo-scoped GitHub App credentials.
          If setup installed the VM drain timer, the trusted VM will pick this up on its next timer run.

          From the trusted machine:

          ```bash
          rucksack vm repo add ${{ github.repository }} --role developer --execute
          rucksack vm codex --install --execute
          rucksack autopilot work ${{ github.repository }} --issue ${{ inputs.issue_number }} --provider vm-codex --execute
          ```

          `autopilot work` runs Codex in the VM checkout, validates with `scripts/agent-evidence` when present, pushes a branch, and opens or reuses a PR.
          If this should run automatically, install or enable the VM drain timer:

          ```bash
          rucksack vm autopilot install-timer ${{ github.repository }} --profile <profile> --execute
          ```
          EOF
          update_provider_handoff "${{ inputs.issue_number }}" "$RUNNER_TEMP/vm-provider.md" "<!-- rucksack-autopilot-provider-handoff -->"

      - name: Claude provider instructions
        if: inputs.provider == 'claude'
        run: |
          set -euo pipefail
          update_provider_handoff() {
            issue_number="$1"
            body_file="$2"
            marker="$3"
            existing_comment_id="$(gh api "repos/$GH_REPO/issues/$issue_number/comments" --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$existing_comment_id" ]; then
              gh api "repos/$GH_REPO/issues/comments/$existing_comment_id" -X PATCH -F body=@"$body_file"
            else
              gh issue comment "$issue_number" --body-file "$body_file"
            fi
            gh issue edit "$issue_number"               --remove-label rucksack-running               --remove-label rucksack-queued               --remove-label rucksack-run               --remove-label rucksack-awaiting-review               --add-label rucksack-blocked               || true
          }
          cat > "$RUNNER_TEMP/claude-provider.md" <<'EOF'
          <!-- rucksack-autopilot-provider-handoff -->
          Rucksack selected `claude` for this issue.

          This is a VM handoff, not a failure. VM-based agents run on the trusted VM, not inside GitHub Actions.
          GitHub is the queue and audit log; it does not SSH into your VM.
          The VM worker uses the VM user's Codex/Claude login and repo-scoped GitHub App credentials.
          If setup installed the VM drain timer, the trusted VM will pick this up on its next timer run.

          From the trusted machine:

          ```bash
          rucksack vm repo add ${{ github.repository }} --role developer --execute
          rucksack vm claude --install --execute
          rucksack autopilot work ${{ github.repository }} --issue ${{ inputs.issue_number }} --provider claude --execute
          ```

          `autopilot work` runs Claude Code in the VM checkout, validates with `scripts/agent-evidence` when present, pushes a branch, and opens or reuses a PR.
          If this should run automatically, install or enable the VM drain timer:

          ```bash
          rucksack vm autopilot install-timer ${{ github.repository }} --profile <profile> --execute
          ```
          EOF
          update_provider_handoff "${{ inputs.issue_number }}" "$RUNNER_TEMP/claude-provider.md" "<!-- rucksack-autopilot-provider-handoff -->"

      - name: Secret scan
        id: secret_scan
        if: inputs.provider == 'codex-action'
        run: |
          set -eu
          token_marker='github''_pat_|gh''p_[A-Za-z0-9_]{20,}'
          private_key_marker='-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE[ ]KEY-----'
          ! git grep -n -E "($token_marker|$private_key_marker)" -- . ':!.git' ':!.agent/harness-backups' ':!.agent/harness-runs'

      - name: Validate and collect evidence
        if: always() && inputs.provider == 'codex-action' && steps.secret_scan.outcome == 'success'
        id: validation
        run: |
          set +e
          validation_status=0
          git diff --check
          diff_status=$?
          if [ "$diff_status" -ne 0 ]; then
            validation_status="$diff_status"
          fi
          if [ -x scripts/agent-evidence ]; then
            scripts/agent-evidence
            evidence_status=$?
          else
            echo "scripts/agent-evidence missing; run rucksack autopilot apply first"
            evidence_status=2
          fi
          if [ "$validation_status" -eq 0 ] && [ "$evidence_status" -ne 0 ]; then
            validation_status="$evidence_status"
          fi
          if [ "$validation_status" -eq 0 ]; then
            validation_result=passed
          else
            validation_result=failed
          fi
          echo "result=$validation_result" >> "$GITHUB_OUTPUT"
          echo "exit_code=$validation_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload evidence artifact
        if: always() && inputs.provider == 'codex-action'
        uses: actions/upload-artifact@v4
        with:
          name: rucksack-autopilot-evidence-${{ inputs.issue_number }}-${{ github.run_id }}
          path: .agent/evidence
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14

      - name: Create or update PR
        if: always() && inputs.provider == 'codex-action' && steps.secret_scan.outcome == 'success'
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.token }}
          branch: codex/issue-${{ inputs.issue_number }}-rucksack
          title: "Rucksack autopilot: ${{ steps.issue.outputs.title }}"
          body: |
            Closes #${{ inputs.issue_number }}

            Generated by Rucksack autopilot from the default-branch workflow.

            Evidence is attached by the follow-up step when `.agent/evidence` contains a manifest.
          commit-message: "feat: build issue ${{ inputs.issue_number }} with rucksack autopilot"
          delete-branch: false

      - name: Attach evidence summary
        if: always() && inputs.provider == 'codex-action'
        run: |
          set -euo pipefail
          upsert_issue_comment() {
            issue_number="$1"
            body_file="$2"
            marker="$3"
            existing_comment_id="$(gh api "repos/$GH_REPO/issues/$issue_number/comments" --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$existing_comment_id" ]; then
              gh api "repos/$GH_REPO/issues/comments/$existing_comment_id" -X PATCH -F body=@"$body_file"
            else
              gh issue comment "$issue_number" --body-file "$body_file"
            fi
          }
          manifest="$(find .agent/evidence -name manifest.json -print 2>/dev/null | sort | tail -1 || true)"
          {
            echo "<!-- rucksack-autopilot-evidence -->"
            echo "### Rucksack autopilot evidence"
            echo
            echo "- Issue: #${{ inputs.issue_number }}"
            echo "- Provider: `${{ inputs.provider }}`"
            echo "- Actions artifact: `rucksack-autopilot-evidence-${{ inputs.issue_number }}-${{ github.run_id }}`"
            echo "- Download: `gh run download ${{ github.run_id }} --name rucksack-autopilot-evidence-${{ inputs.issue_number }}-${{ github.run_id }}`"
            if [ -n "${{ steps.cpr.outputs.pull-request-number }}" ]; then
              echo "- Pull request: #${{ steps.cpr.outputs.pull-request-number }}"
            fi
            echo "- Secret scan: `${{ steps.secret_scan.outcome }}`"
            echo "- Validation: `${{ steps.validation.outputs.result || 'not-run' }}`"
            if [ -n "$manifest" ]; then
              echo "- Manifest: `$manifest`"
              node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); console.log(`- Result: \`${m.result}\``); console.log(`- Commit: \`${m.commit}\``); console.log(`- Lanes: \`${(m.lanes_run || []).join(", ") || "(none)"}\``);' "$manifest"
            else
              echo "- Manifest: `(not produced)`"
            fi
          } > "$RUNNER_TEMP/evidence.md"
          upsert_issue_comment "${{ inputs.issue_number }}" "$RUNNER_TEMP/evidence.md" "<!-- rucksack-autopilot-evidence -->"
          if [ -n "${{ steps.cpr.outputs.pull-request-number }}" ]; then
            gh pr comment "${{ steps.cpr.outputs.pull-request-number }}" --body-file "$RUNNER_TEMP/evidence.md"
          fi
          secret_scan="${{ steps.secret_scan.outcome }}"
          validation_result="${{ steps.validation.outputs.result }}"
          if [ "$secret_scan" = "success" ] && [ "$validation_result" = "passed" ]; then
            gh issue edit "${{ inputs.issue_number }}"               --remove-label rucksack-running               --remove-label rucksack-queued               --remove-label rucksack-run               --remove-label rucksack-blocked               --remove-label rucksack-needs-clarification               --remove-label rucksack-needs-decision               --remove-label rucksack-needs-human               --remove-label rucksack-provider-limited               --remove-label rucksack-out-of-work               --add-label rucksack-awaiting-review               || true
          else
            gh issue edit "${{ inputs.issue_number }}"               --remove-label rucksack-running               --remove-label rucksack-queued               --remove-label rucksack-run               --remove-label rucksack-awaiting-review               --remove-label rucksack-needs-human               --remove-label rucksack-provider-limited               --remove-label rucksack-out-of-work               --add-label rucksack-blocked               || true
          fi

      - name: Fail workflow on validation failure
        if: always() && inputs.provider == 'codex-action' && (steps.secret_scan.outcome == 'failure' || steps.validation.outputs.result == 'failed')
        run: |
          set -euo pipefail
          if [ "${{ steps.secret_scan.outcome }}" != "success" ]; then
            echo "secret scan failed; evidence summary was attached before failing"
            exit 1
          fi
          echo "validation failed; evidence summary was attached before failing"
          exit "${{ steps.validation.outputs.exit_code }}"
