# Generated by rucksack. This default-branch workflow owns queue state and dispatch only.
name: Rucksack Autopilot

on:
  issues:
    types: [opened, edited, labeled, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      action:
        description: "queue | run | retry | hold"
        required: false
        type: string
        default: "queue"
      issue_number:
        description: "Optional issue number for run/retry/hold"
        required: false
        type: string
      provider:
        description: "Provider: codex-action | vm-codex | claude"
        required: false
        type: string
        default: "vm-codex"
      max_dispatches:
        description: "Maximum queued issues to dispatch"
        required: false
        type: string
        default: "2"
  schedule:
    # Overnight in Singapore by default.
    - cron: "17 18 * * *"

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: rucksack-autopilot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >-
      (github.event_name != 'issue_comment' ||
      startsWith(github.event.comment.body, '/rucksack')) &&
      (github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'master' }}
      DEFAULT_PROVIDER: "vm-codex"
      DEFAULT_MAX_DISPATCHES: "2"
      HUMAN_PING: "@erniesg"
    steps:
      - name: Resolve request
        id: request
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number || '' }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          INPUT_ACTION: ${{ github.event.inputs.action || '' }}
          INPUT_PROVIDER: ${{ github.event.inputs.provider || '' }}
          INPUT_MAX_DISPATCHES: ${{ github.event.inputs.max_dispatches || '' }}
        run: |
          set -euo pipefail
          action="queue"
          issue_number="${ISSUE_NUMBER:-}"
          provider="${INPUT_PROVIDER:-$DEFAULT_PROVIDER}"
          max_dispatches="${INPUT_MAX_DISPATCHES:-$DEFAULT_MAX_DISPATCHES}"

          if [ "$EVENT_NAME" = "issues" ]; then
            case ",${ISSUE_LABELS:-}," in
              *",rucksack-run,"*|*",rucksack-queued,"*) action="run" ;;
              *) action="inspect" ;;
            esac
          elif [ "$EVENT_NAME" = "issue_comment" ]; then
            set -- ${COMMENT_BODY:-}
            action="${2:-queue}"
            target="${3:-}"
            case "$target" in
              \#*) issue_number="${target#\#}" ;;
              [0-9]*) issue_number="$target" ;;
            esac
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            action="${INPUT_ACTION:-queue}"
          fi
          action="$(printf '%s' "$action" | tr '[:upper:]' '[:lower:]')"
          case "$action" in
            accept|approve|resolve) action="queue" ;;
          esac

          case "$provider" in
            codex-action|vm-codex|claude) ;;
            *) echo "Unsupported provider: $provider"; exit 2 ;;
          esac

          echo "action=$action" >> "$GITHUB_OUTPUT"
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "max_dispatches=$max_dispatches" >> "$GITHUB_OUTPUT"

      - name: Sweep stale running issues
        if: steps.request.outputs.action == 'queue'
        run: |
          set -euo pipefail
          cutoff="$(date -u -d '2 days ago' +%F)"
          gh issue list             --state open             --search "repo:$GH_REPO is:issue is:open label:rucksack-running updated:<$cutoff"             --limit 50             --json number             --jq '.[].number' > "$RUNNER_TEMP/stale-running.txt"
          if [ ! -s "$RUNNER_TEMP/stale-running.txt" ]; then
            echo "No stale rucksack-running issues."
            exit 0
          fi
          while read -r issue_number; do
            [ -n "$issue_number" ] || continue
            gh issue edit "$issue_number"               --remove-label rucksack-running               --add-label rucksack-blocked               || true
            cat > "$RUNNER_TEMP/stale-running-$issue_number.md" <<'EOF'
          <!-- rucksack-autopilot-stale-running -->
          Rucksack autopilot found this issue stuck in `rucksack-running` past the stale-run cutoff.

          The issue was moved to `rucksack-blocked` so a human can inspect the previous workflow run and decide whether to requeue it.
          EOF
            gh issue comment "$issue_number" --body-file "$RUNNER_TEMP/stale-running-$issue_number.md"
          done < "$RUNNER_TEMP/stale-running.txt"

      - name: Queue commented issue
        if: steps.request.outputs.action == 'queue' && steps.request.outputs.issue_number != ''
        run: |
          gh issue edit "${{ steps.request.outputs.issue_number }}"             --add-label rucksack-queued             --remove-label rucksack-run             --remove-label rucksack-running             --remove-label rucksack-blocked             --remove-label rucksack-needs-clarification             --remove-label rucksack-needs-decision             --remove-label rucksack-needs-human             --remove-label rucksack-provider-limited             --remove-label rucksack-out-of-work             --remove-label rucksack-awaiting-review             || true

      - name: Dispatch queued issues
        if: steps.request.outputs.action == 'queue'
        run: |
          set -euo pipefail
          upsert_issue_comment() {
            issue_number="$1"
            body_file="$2"
            marker="$3"
            existing_comment_id="$(gh api "repos/$GH_REPO/issues/$issue_number/comments" --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$existing_comment_id" ]; then
              gh api "repos/$GH_REPO/issues/comments/$existing_comment_id" -X PATCH -F body=@"$body_file"
            else
              gh issue comment "$issue_number" --body-file "$body_file"
            fi
          }

          issue_provider_from_body() {
            body_file="$1"
            provider="$(sed -n 's/.*<!-- rucksack-autopilot-provider:\([^ >]*\) -->.*/\1/p' "$body_file" | head -n 1)"
            case "$provider" in
              codex-action|vm-codex|claude) printf '%s\n' "$provider" ;;
              *) printf '%s\n' "${{ steps.request.outputs.provider }}" ;;
            esac
          }

          cat > "$RUNNER_TEMP/check-dependencies.js" <<'EOF'
          const fs = require("fs");
          const [allIssuesPath, issueBodyPath] = process.argv.slice(2);
          const allIssues = JSON.parse(fs.readFileSync(allIssuesPath, "utf8"));
          const issueBody = fs.readFileSync(issueBodyPath, "utf8");
          const dependencyMatch = issueBody.match(/<!--[ 	]*rucksack-autopilot-depends-on:([^>]*)-->/);
          if (!dependencyMatch) {
            console.log("ready");
            process.exit(0);
          }
          const dependencies = dependencyMatch[1].split(",").map((item) => item.trim()).filter(Boolean);
          const bySpec = new Map();
          for (const issue of allIssues) {
            const body = String(issue.body || "");
            const marker = body.match(/<!--[ 	]*[A-Za-z0-9_.-]+:([^ >]+)[ 	]*-->/);
            if (marker) bySpec.set(marker[1], issue);
          }
          for (const dependency of dependencies) {
            const issue = bySpec.get(dependency);
            if (!issue) {
              console.log(`dependency_not_found:${dependency}`);
              process.exit(0);
            }
            const labels = (issue.labels || []).map((label) => typeof label === "string" ? label : label.name);
            if (issue.state !== "CLOSED" && !labels.includes("rucksack-awaiting-review")) {
              console.log(`dependency_not_ready:${dependency}`);
              process.exit(0);
            }
          }
          console.log("ready");
          EOF

          clarify_or_dispatch_queued_issue() {
            issue_number="$1"
            issue_file="$RUNNER_TEMP/issue-$issue_number.txt"
            issue_body_file="$RUNNER_TEMP/issue-$issue_number-body.txt"
            issue_labels_file="$RUNNER_TEMP/issue-$issue_number-labels.txt"
            gh issue view "$issue_number"               --json title,body               --jq '.title + "\n\n" + (.body // "")' > "$issue_file"
            gh issue view "$issue_number"               --json body               --jq '.body // ""' > "$issue_body_file"
            gh issue view "$issue_number"               --json labels               --jq '.labels[].name' > "$issue_labels_file"
            if grep -Eq '^(rucksack-needs-human|rucksack-provider-limited|rucksack-out-of-work)$' "$issue_labels_file"; then
              echo "Skipping #$issue_number: waiting on human/provider-limit/out-of-work resolution"
              return
            fi
            dependency_status="$(node "$RUNNER_TEMP/check-dependencies.js" "$RUNNER_TEMP/all-issues.json" "$issue_body_file")"
            if [ "$dependency_status" != "ready" ]; then
              echo "Skipping #$issue_number: $dependency_status"
              return
            fi
            issue_provider="$(issue_provider_from_body "$issue_body_file")"
            if grep -Eiq 'definition of done|acceptance|validation|done when|artifact outputs|stop conditions' "$issue_file"; then
              gh workflow run rucksack-build.yml                 --ref "$DEFAULT_BRANCH"                 -f issue_number="$issue_number"                 -f provider="$issue_provider"
              gh issue edit "$issue_number"                 --add-label rucksack-running                 --remove-label rucksack-queued                 --remove-label rucksack-needs-clarification                 --remove-label rucksack-needs-decision                 --remove-label rucksack-needs-human                 --remove-label rucksack-provider-limited                 --remove-label rucksack-out-of-work                 || true
              return
            fi

            gh issue edit "$issue_number"               --add-label rucksack-needs-clarification               --remove-label rucksack-queued               --remove-label rucksack-running               --remove-label rucksack-needs-decision               --remove-label rucksack-needs-human               --remove-label rucksack-provider-limited               --remove-label rucksack-out-of-work               || true
            cat > "$RUNNER_TEMP/clarify-$issue_number.md" <<'EOF'
          <!-- rucksack-autopilot-clarification -->
          Rucksack autopilot needs a clearer definition of done before dispatching this issue.

          EOF
            if [ -n "${HUMAN_PING:-}" ]; then
              cat >> "$RUNNER_TEMP/clarify-$issue_number.md" <<EOF
          Ping: $HUMAN_PING

          EOF
            fi
            cat >> "$RUNNER_TEMP/clarify-$issue_number.md" <<'EOF'
          Please add one of these to the issue body:
          - Acceptance tests
          - Validation command
          - Artifact outputs
          - Stop conditions or human decision needed

          After updating, comment `/rucksack run #ISSUE` or add the `rucksack-run` label.
          EOF
            upsert_issue_comment "$issue_number" "$RUNNER_TEMP/clarify-$issue_number.md" "<!-- rucksack-autopilot-clarification -->"
          }

          gh issue list             --repo "$GH_REPO"             --state all             --limit 200             --json number,state,labels,body > "$RUNNER_TEMP/all-issues.json"
          gh issue list             --state open             --label rucksack-queued             --limit "${{ steps.request.outputs.max_dispatches }}"             --json number             --jq '.[].number' > "$RUNNER_TEMP/queued.txt"
          if [ ! -s "$RUNNER_TEMP/queued.txt" ]; then
            echo "No rucksack-queued issues."
            exit 0
          fi
          while read -r issue_number; do
            [ -n "$issue_number" ] || continue
            clarify_or_dispatch_queued_issue "$issue_number"
          done < "$RUNNER_TEMP/queued.txt"

      - name: Hold issue
        if: steps.request.outputs.action == 'hold' && steps.request.outputs.issue_number != ''
        run: |
          gh issue edit "${{ steps.request.outputs.issue_number }}"             --add-label rucksack-blocked             --remove-label rucksack-queued             --remove-label rucksack-run             --remove-label rucksack-running             --remove-label rucksack-needs-decision             --remove-label rucksack-needs-human             --remove-label rucksack-provider-limited             --remove-label rucksack-out-of-work             || true
          gh issue comment "${{ steps.request.outputs.issue_number }}"             --body "Rucksack autopilot is holding this issue until a human updates the definition of done or removes the blocker."

      - name: Check definition of done
        if: >-
          (steps.request.outputs.action == 'run' || steps.request.outputs.action == 'retry') &&
          steps.request.outputs.issue_number != ''
        id: dod
        run: |
          set -euo pipefail
          issue_number="${{ steps.request.outputs.issue_number }}"
          upsert_issue_comment() {
            issue_number="$1"
            body_file="$2"
            marker="$3"
            existing_comment_id="$(gh api "repos/$GH_REPO/issues/$issue_number/comments" --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$existing_comment_id" ]; then
              gh api "repos/$GH_REPO/issues/comments/$existing_comment_id" -X PATCH -F body=@"$body_file"
            else
              gh issue comment "$issue_number" --body-file "$body_file"
            fi
          }
          issue_provider_from_body() {
            body_file="$1"
            provider="$(sed -n 's/.*<!-- rucksack-autopilot-provider:\([^ >]*\) -->.*/\1/p' "$body_file" | head -n 1)"
            case "$provider" in
              codex-action|vm-codex|claude) printf '%s\n' "$provider" ;;
              *) printf '%s\n' "${{ steps.request.outputs.provider }}" ;;
            esac
          }
          gh issue view "$issue_number"             --json title,body             --jq '.title + "\n\n" + (.body // "")' > "$RUNNER_TEMP/issue.txt"
          issue_provider="$(issue_provider_from_body "$RUNNER_TEMP/issue.txt")"
          echo "provider=$issue_provider" >> "$GITHUB_OUTPUT"
          if grep -Eiq 'definition of done|acceptance|validation|done when|artifact outputs' "$RUNNER_TEMP/issue.txt"; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
          gh issue edit "$issue_number"             --add-label rucksack-needs-clarification             --remove-label rucksack-run             --remove-label rucksack-queued             --remove-label rucksack-needs-decision             --remove-label rucksack-needs-human             --remove-label rucksack-provider-limited             --remove-label rucksack-out-of-work             || true
          cat > "$RUNNER_TEMP/clarify.md" <<'EOF'
          <!-- rucksack-autopilot-clarification -->
          Rucksack autopilot needs a clearer definition of done before dispatching this issue.

          EOF
          if [ -n "${HUMAN_PING:-}" ]; then
            cat >> "$RUNNER_TEMP/clarify.md" <<EOF
          Ping: $HUMAN_PING

          EOF
          fi
          cat >> "$RUNNER_TEMP/clarify.md" <<'EOF'
          Please add one of these to the issue body:
          - Acceptance tests
          - Validation command
          - Artifact outputs
          - Stop conditions or human decision needed

          After updating, comment `/rucksack run #ISSUE` or add the `rucksack-run` label.
          EOF
          upsert_issue_comment "$issue_number" "$RUNNER_TEMP/clarify.md" "<!-- rucksack-autopilot-clarification -->"

      - name: Dispatch issue build
        if: steps.dod.outputs.ready == 'true'
        run: |
          set -euo pipefail
          issue_number="${{ steps.request.outputs.issue_number }}"
          gh issue edit "$issue_number"             --add-label rucksack-running             --remove-label rucksack-queued             --remove-label rucksack-run             --remove-label rucksack-needs-clarification             --remove-label rucksack-needs-decision             --remove-label rucksack-needs-human             --remove-label rucksack-provider-limited             --remove-label rucksack-out-of-work             || true
          gh workflow run rucksack-build.yml             --ref "$DEFAULT_BRANCH"             -f issue_number="$issue_number"             -f provider="${{ steps.dod.outputs.provider || steps.request.outputs.provider }}"
