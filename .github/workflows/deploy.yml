# Generated by rucksack. Deploys run from GitHub-hosted runners over environment-scoped SSH.
name: Rucksack Deploy

on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.repository }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'push' }}
  cancel-in-progress: false

jobs:
  full-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Set up Python project dependencies
        run: |
          set -eu
          if [ ! -f pyproject.toml ] && [ ! -f requirements.txt ]; then
            echo "no Python project metadata; skipping Python dependency setup"
            exit 0
          fi
          python3 -m venv .rucksack-ci-venv
          . .rucksack-ci-venv/bin/activate
          python3 -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            python3 -m pip install -e '.[dev]' || python3 -m pip install -e .
          fi
          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt
          fi
      - name: Set up Node project dependencies
        run: |
          set -eu
          if [ ! -f package.json ]; then
            echo "no package.json; skipping Node dependency setup"
            exit 0
          fi
          corepack enable || true
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
            runner=pnpm
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
            runner=yarn
          elif [ -f package-lock.json ]; then
            npm ci
            runner=npm
          else
            npm install
            runner=npm
          fi
          echo "$runner" > .rucksack-node-runner
      - name: Agent evidence
        id: deploy_agent_evidence
        continue-on-error: true
        run: |
          set -u
          if [ -d .rucksack-ci-venv ]; then
            . .rucksack-ci-venv/bin/activate
          fi
          status=0
          if [ -x scripts/agent-evidence ]; then
            scripts/agent-evidence || status=$?
          else
            echo "scripts/agent-evidence not present; run rucksack init to add it"
          fi
          manifest="$(find .agent/evidence -name manifest.json -type f -print 2>/dev/null | sort | tail -n 1 || true)"
          echo "agent_evidence_status=$status" >> "$GITHUB_OUTPUT"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "::warning::scripts/agent-evidence exited with status $status"
          fi
      - name: Summarize agent evidence
        if: always()
        run: |
          set -eu
          manifest="${{ steps.deploy_agent_evidence.outputs.manifest }}"
          status="${{ steps.deploy_agent_evidence.outputs.agent_evidence_status }}"
          echo "### Rucksack agent evidence" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: \`${status:-not-run}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$manifest" ]; then
            echo "- Manifest: \`$manifest\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Manifest: not found" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload agent evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rucksack-deploy-evidence-${{ github.run_id }}
          path: .agent/evidence
          if-no-files-found: ignore
          retention-days: 14
      - name: Secret scan
        run: |
          set -eu
          token_marker='github''_pat_|gh''p_[A-Za-z0-9_]{20,}'
          private_key_marker='-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE[ ]KEY-----'
          ! git grep -n -E "($token_marker|$private_key_marker)" -- . ':!.git' ':!.agent/harness-backups' ':!.agent/harness-runs'
      - name: Repository checks
        run: |
          set -eu
          if [ -f package.json ]; then
            if [ -f .rucksack-node-runner ]; then
              runner="$(cat .rucksack-node-runner)"
            else
              corepack enable || true
              if [ -f pnpm-lock.yaml ]; then
                pnpm install --frozen-lockfile
                runner=pnpm
              elif [ -f yarn.lock ]; then
                yarn install --frozen-lockfile
                runner=yarn
              elif [ -f package-lock.json ]; then
                npm ci
                runner=npm
              else
                npm install
                runner=npm
              fi
            fi
            if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint?0:1)"; then
              $runner run lint
            fi
            if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
              $runner run build
            fi
            if node -e "const s=require('./package.json').scripts||{}; process.exit(s['type-check']?0:1)"; then
              $runner run type-check
            elif node -e "const s=require('./package.json').scripts||{}; process.exit(s.typecheck?0:1)"; then
              $runner run typecheck
            fi
            if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
              $runner run test
            fi
          fi
          if [ -d tests ] && find tests -name 'test*.py' -print -quit | grep -q .; then
            python -m pip install --upgrade pip
            python -m pip install -e . || true
            python -m unittest discover -s tests
          fi

  production-checks:
    if: ${{ vars.RUCKSACK_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && inputs.environment == 'production')) }}
    needs: full-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Strict dependency and IaC checks
        run: |
          set -eu
          if [ -f package-lock.json ] && [ ! -f pnpm-lock.yaml ] && [ ! -f yarn.lock ]; then
            npm audit --audit-level=high
          elif [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            echo "non-npm lockfile present; skipping npm audit"
          fi
          if find . -name '*.tf' -not -path './.git/*' -print -quit | grep -q .; then
            if command -v tofu >/dev/null 2>&1; then
              tofu fmt -check -recursive
              tofu init -backend=false
              tofu validate
            elif command -v terraform >/dev/null 2>&1; then
              terraform fmt -check -recursive
              terraform init -backend=false
              terraform validate
            else
              echo "::warning::OpenTofu/Terraform files detected but neither tofu nor terraform is installed"
            fi
          fi

  staging:
    if: ${{ vars.RUCKSACK_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref_name == 'staging') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'staging' && inputs.environment == 'staging')) }}
    needs: full-ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: OpenTofu/Terraform plan
        run: |
          set -eu
          if find . -name '*.tf' -not -path './.git/*' -print -quit | grep -q .; then
            if command -v tofu >/dev/null 2>&1; then
              tofu init -input=false
              tofu plan -input=false
            elif command -v terraform >/dev/null 2>&1; then
              terraform init -input=false
              terraform plan -input=false
            else
              echo "::warning::OpenTofu/Terraform files detected but neither tofu nor terraform is installed"
            fi
          fi
      - name: Deploy staging to VM
        env:
          DEPLOY_ENV: staging
          RUCKSACK_PROFILE: erniesg-ai-vm
          REMOTE_ROOT: /opt/rucksack-app/staging/erniesg-paillette
          ENV_FILE: /etc/rucksack-app/erniesg-paillette/staging.env
          COMPOSE_PROJECT_NAME: rucksack-staging-erniesg-paillette
          HEALTHCHECK_URL: ${{ vars.RUCKSACK_HEALTHCHECK_URL }}
          RUCKSACK_VM_HOST: ${{ secrets.RUCKSACK_VM_HOST }}
          RUCKSACK_VM_USER: ${{ secrets.RUCKSACK_VM_USER }}
          RUCKSACK_VM_SSH_KEY: ${{ secrets.RUCKSACK_VM_SSH_KEY }}
          RUCKSACK_APP_ENV: ${{ secrets.RUCKSACK_APP_ENV }}
        run: |
          set -eu
          ./infra/vm/deploy.sh --github-actions

  production:
    if: ${{ vars.RUCKSACK_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && inputs.environment == 'production')) }}
    needs:
      - full-ci
      - production-checks
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: OpenTofu/Terraform plan
        run: |
          set -eu
          if find . -name '*.tf' -not -path './.git/*' -print -quit | grep -q .; then
            if command -v tofu >/dev/null 2>&1; then
              tofu init -input=false
              tofu plan -input=false
            elif command -v terraform >/dev/null 2>&1; then
              terraform init -input=false
              terraform plan -input=false
            else
              echo "::warning::OpenTofu/Terraform files detected but neither tofu nor terraform is installed"
            fi
          fi
      - name: Deploy production to VM
        env:
          DEPLOY_ENV: production
          RUCKSACK_PROFILE: erniesg-ai-vm
          REMOTE_ROOT: /opt/rucksack-app/production/erniesg-paillette
          ENV_FILE: /etc/rucksack-app/erniesg-paillette/production.env
          COMPOSE_PROJECT_NAME: rucksack-production-erniesg-paillette
          HEALTHCHECK_URL: ${{ vars.RUCKSACK_HEALTHCHECK_URL }}
          RUCKSACK_VM_HOST: ${{ secrets.RUCKSACK_VM_HOST }}
          RUCKSACK_VM_USER: ${{ secrets.RUCKSACK_VM_USER }}
          RUCKSACK_VM_SSH_KEY: ${{ secrets.RUCKSACK_VM_SSH_KEY }}
          RUCKSACK_APP_ENV: ${{ secrets.RUCKSACK_APP_ENV }}
        run: |
          set -eu
          ./infra/vm/deploy.sh --github-actions
